name: Mirror to GitLab

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  delete:

concurrency:
  group: mirror-to-gitlab-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror repository to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          if [ -z "${GITLAB_TOKEN}" ]; then
            echo "::error::GITLAB_TOKEN secret is not set."
            exit 1
          fi

          git clone --mirror \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git" repo.git
          cd repo.git

          git push --mirror \
            "https://oauth2:${GITLAB_TOKEN}@gitlab.com/teodorio95/${REPO_NAME}.git"
